name: Build and Test
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build_test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup uv (Python)
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Run API tests
        run: nx run api:test
        continue-on-error: true

      - name: Run UI tests
        run: nx run ui:test
        continue-on-error: true

      - name: Build UI
        run: nx run ui:build
        continue-on-error: true
